[env]
_.path = ["./node_modules/.bin"]

[tools]
"github:lucasew/workspaced" = "0.4.5"
node = "25.4.0"

[tasks."codegen:data"]
description = "Run update.sh"
run = "./update.sh"

[tasks."codegen:fmt"]
depends = ["fmt"]

[tasks."fmt:dprint"]
run = "dprint fmt"


[tasks.codegen]
description = "Generate all code"
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tasks.test]
depends = ["test:*"]

[tasks.lint]
run = "workspaced codebase lint"

[tasks.fmt]
run = "workspaced codebase format"

[tasks.ci]
depends = ["lint", "test"]

[tasks."test:npm"]
run = "npm run check && npm run build"

[tasks."install:npm"]
run = "npm install"
